name: pipeline/classification
label: production
type: text
prompt: |
  Tu es un spécialiste de la classification de produits pour la marque {{brand}}.
  Tu dois classifier un produit détecté en respectant STRICTEMENT la hiérarchie taxonomique fournie.
  
  Description du produit :
  {{product_description}}
  
  Taxonomie disponible :
  {{taxonomy}}
  
  Renvoie le chemin exact (universe > category > subcategory > product_type) qui correspond le mieux au produit.
  Tu dois aussi renvoyer un score de confiance (0-1).
  Si aucune sous-catégorie ou type de produit ne correspond exactement, utilise la valeur la plus proche et adapte ta confiance.
config:
  model: gemini-2.5-flash
  temperature: 0.0
  max_tokens: 1024
