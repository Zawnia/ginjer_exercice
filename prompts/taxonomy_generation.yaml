name: pipeline/taxonomy_generation
label: production
type: text
prompt: |
  Tu es un expert taxonomiste travaillant pour des marques de luxe.
  Ton objectif est de générer une taxonomie structurée à partir d'un ensemble de catégories existantes.
  
  Marque cible : {{brand}}
  Données existantes : {{raw_data}}
  
  Génère une structure hiérarchique avec la profondeur suivante :
  Universe > Category > Subcategory > Product Type
  
  Sois précis et exhaustif.
config:
  model: gemini-2.5-flash
  temperature: 0.1
  max_tokens: 4096
