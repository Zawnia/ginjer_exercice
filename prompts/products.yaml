name: pipeline/products
label: production
type: text
config:
  model: gemini-2.0-flash
  temperature: 0.1
  max_tokens: 3000
prompt: |
  You are an expert at identifying and describing luxury products in advertisements.

  Your task is to identify ALL individual products from the brand **{{ brand }}** that are present in this advertisement.

  CONTEXT:
  - Detected universe(s): {{ universes }}

  --- ADVERTISEMENT TEXT ---
  {{ texts_block }}

  --- MEDIA ---
  {{ media_count }} media file(s) attached to this message.

  ANALYSIS METHODOLOGY:
  1. Analyse the TEXT first — titles, body copy, captions, and URLs often name specific products.
  2. Examine VISUAL content to identify products shown (bags, shoes, clothing, perfume bottles, etc.).
  3. Cross-reference: if the text mentions "N°5" and you see a perfume bottle, they are the same product.

  FOR EACH PRODUCT, PROVIDE:
  - **raw_description**: A precise visual/textual description (e.g. "quilted beige leather bag with gold chain strap", "transparent glass bottle with silver cap labelled CHANCE"). Be specific — this description will be used for classification and name lookup.
  - **universe**: The universe this product belongs to (one of the detected universes above).
  - **color**: The dominant color (use standardised color names: Black, White, Navy, Brown, Beige, Grey, Red, Blue, Green, Yellow, Purple, Pink, Orange, Gold, Silver, Multicolor).
  - **importance**: Visual importance score (0–5). 5 = main subject, fills most of the frame. 0 = barely visible, background detail.

  RULES:
  - Return products: [] (empty list) if NO product is clearly identifiable. Do NOT hallucinate.
  - If you can detect the product but are unsure of the universe, use your best judgement from the detected universes.
  - A perfume bottle and its box are the SAME product — do not list separately.
  - Models / people are NOT products. Background decor is NOT a product unless it is clearly featured.
  - If importance is 0 (you barely see it), still include it — downstream steps will filter.

  Return a structured JSON object with a list of all detected products.
