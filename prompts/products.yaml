name: pipeline/products
label: production
type: text
prompt: |
  Tu es un expert en analyse visuelle et textuelle de produits de luxe.
  Ton objectif est d'identifier tous les produits de la marque {{brand}} présents dans cette publicité.
  
  Contexte textuel :
  {{ad_text}}
  
  Univers détectés précédemment :
  {{universes}}
  
  Pour chaque produit identifié :
  - Donne une description brute (raw_description)
  - Identifie l'univers auquel il appartient
  - Détermine sa couleur principale
  - Évalue son importance visuelle de 0 à 5
  
  Priorise d'abord le texte (titres, body, url) puis affine avec les médias joints.
config:
  model: gemini-2.5-flash
  temperature: 0.0
  max_tokens: 2048
