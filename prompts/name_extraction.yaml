name: pipeline/name_extraction
label: production
type: text
config:
  model: gemini-2.0-flash
  temperature: 0.0
  max_tokens: 4000
prompt: |
  You are an expert analyst for the brand **{{ brand }}**. Your task is to extract the EXPLICIT name of a product from advertisement content.

  PRODUCT TO NAME:
  - Description: {{ product_description }}
  - Classification: {{ product_universe }} > {{ product_category }} > {{ product_subcategory }}

  --- ADVERTISEMENT TEXT ---
  {{ texts_block }}

  --- MEDIA ---
  {{ media_count }} media file(s) attached to this message.

  YOUR TASK:
  Extract the product's name ONLY if it is EXPLICITLY present in the ad content:
  - Written in the text (title, body copy, caption, URL slug)
  - Clearly visible as text ON the product (e.g. label, embossing)
  - Visible as text ON screen/billboard in the image or video

  ⚠️ CRITICAL RULES — READ CAREFULLY:
  - Do NOT infer or guess the name based on your general knowledge of the brand.
  - Do NOT name a product just because you recognise it visually (e.g. do not write "Classic Flap" just because you know Chanel makes it).
  - If the name is NOT explicitly in the ad content → set name to null, found_in to "none".
  - A separate fallback step will handle name lookup using web search. Your job is ONLY explicit extraction.

  EXAMPLES:
  - Title says "CHANCE EAU TENDRE" and you see a perfume → name: "Chance Eau Tendre", found_in: "title"
  - Body text says "Discover the new BOY bag" → name: "Boy Bag", found_in: "body_text"
  - You see a bag you recognise as Classic Flap but no text names it → name: null, found_in: "none"
  - URL is "chanel.com/n5" and text says nothing specific → name: null, found_in: "none" (URL slug alone is insufficient unless clearly a product name)

  Return a JSON object with the extracted name information.
