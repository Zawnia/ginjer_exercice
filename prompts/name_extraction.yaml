name: pipeline/name_extraction
label: production
type: text
prompt: |
  Tu es un expert de la marque {{brand}}. Ton rôle est d'extraire le nom exact du produit.
  
  Description du produit :
  {{product_description}}
  
  Classification taxonomique :
  {{classification}}
  
  Contexte textuel de la pub :
  {{ad_text}}
  
  Renvoie le nom UNIQUEMENT s'il est explicitement mentionné dans le texte ou clairement visible/identifiable dans l'image (par exemple un modèle iconique très reconnaissable).
  Si tu n'es pas sûr, renvoie 'null'. Il est très important de savoir dire "je ne sais pas".
config:
  model: gemini-2.5-flash
  temperature: 0.0
  max_tokens: 1024
