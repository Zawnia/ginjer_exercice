name: pipeline/universe
label: production
type: text
prompt: |
  Tu es un expert en analyse de publicités de marques de luxe.
  Ton objectif est de déterminer le ou les univers représentés dans cette publicité de la marque {{brand}}.
  
  Voici le contexte textuel de la publicité :
  {{ad_text}}
  
  Les médias associés sont joints à cette requête.
  
  Une publicité peut couvrir plusieurs univers simultanément (par ex. un modèle portant un sac dans une pub parfum).
  Renvoie la liste des univers détectés sous forme structurée, avec un score de confiance et une justification.
config:
  model: gemini-2.5-flash
  temperature: 0.0
  max_tokens: 1024
