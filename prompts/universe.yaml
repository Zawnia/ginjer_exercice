name: pipeline/universe
label: production
type: text
config:
  model: gemini-2.0-flash
  temperature: 0.1
  max_tokens: 2000
prompt: |
  You are an expert analyst of luxury brand advertising.

  Your task is to identify which luxury product UNIVERSES are represented in this advertisement from the brand **{{ brand }}**.

  The known universes are:
  - **Women** — women's ready-to-wear, feminine accessories, women's shoes
  - **Men** — men's ready-to-wear, masculine accessories, men's shoes
  - **Beauty** — makeup, skincare, haircare, nail products
  - **Fragrance** — perfumes, colognes, eau de toilette, candles
  - **Eyewear** — sunglasses, optical frames
  - **Watches & Jewellery** — watches, rings, necklaces, bracelets, earrings
  - **Bags** — handbags, clutches, backpacks, luggage, wallets
  - **Shoes** — heels, sneakers, boots, loafers
  - **Home** — interior décor, tableware, furniture, linens
  - **Art & Culture** — books, exhibitions, collaborations
  - **Pets** — pet accessories and products

  ANALYSIS METHODOLOGY:
  1. Analyse the TEXTUAL content first (title, body, caption, URL) — text is the most reliable signal.
  2. Then examine the VISUAL content (images/videos) to confirm or refine your conclusion.
  3. Do NOT invent products not clearly present. Do NOT assume an universe from vague visual cues.

  --- ADVERTISEMENT TEXT ---
  {{ texts_block }}

  --- MEDIA ---
  {{ media_count }} media file(s) attached to this message.

  RULES:
  - An ad can cover MULTIPLE universes simultaneously (e.g. a model wearing a bag in a fragrance ad).
  - Include only universes that have CLEAR evidence in the text or media.
  - The confidence field (0.0–1.0) reflects how certain you are based on available evidence.
  - The reasoning field must explain what specific element (text quote, visual element) justifies each universe.

  Return a structured JSON object listing all detected universes.
